name: Build ERPNext16 single-container AIO image

"on":
  pull_request: {}
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 v16.60.0）。留空则自动发现 upstream 最新 v16.x.y"
        required: false
      force_rebuild:
        description: "强制全量重建（禁用缓存）"
        type: boolean
        default: false
  schedule:
    - cron: "41 2 * * *" # daily (UTC)

permissions:
  contents: write
  packages: write

concurrency:
  group: erpnext16-single-aio-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ERP_MAJOR: "16"

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Discover upstream ERPNext v16.x.y
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          MAJOR="${ERP_MAJOR:-16}"
          PATTERN="^v?${MAJOR}\\.[0-9]+\\.[0-9]+$"
          INPUT_VER="${{ inputs.version }}"
          if [[ -n "$INPUT_VER" ]]; then
            [[ "$INPUT_VER" =~ $PATTERN ]] || { echo "::error::invalid version $INPUT_VER"; exit 1; }
            echo "ver_v=$INPUT_VER" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VER_V=$(python3 - <<'PY'
import json, re, urllib.request
major='16'
pat=re.compile(rf'^v?{major}\.(\d+)\.(\d+)$')
url='https://hub.docker.com/v2/repositories/frappe/erpnext/tags?page_size=100'
found=[]
for _ in range(20):
  req=urllib.request.Request(url, headers={'Accept':'application/json'})
  with urllib.request.urlopen(req, timeout=30) as r:
    data=json.load(r)
  for it in data.get('results', []):
    name=it.get('name')
    if not name: continue
    m=pat.match(name)
    if m:
      found.append((int(m.group(1)), int(m.group(2)), name if name.startswith('v') else 'v'+name))
  url=data.get('next')
  if not url: break
if not found:
  raise SystemExit(1)
found.sort()
print(found[-1][2])
PY
          )
          echo "ver_v=$VER_V" >> "$GITHUB_OUTPUT"

      - name: Build apps.json base64 (pin erpnext to discovered tag)
        id: apps
        shell: bash
        run: |
          set -euo pipefail
          VER_V="${{ steps.upstream.outputs.ver_v }}"
          jq --arg ver "$VER_V" 'map(if (.url|test("frappe/erpnext$")) then .branch=$ver else . end)' erpnext16/image/apps.json > /tmp/apps.json
          echo "apps_json_base64=$(base64 -w 0 /tmp/apps.json)" >> "$GITHUB_OUTPUT"

      - name: Build (PR: no push)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: ./erpnext16/single-aio
          file: ./erpnext16/single-aio/Containerfile
          push: false
          platforms: linux/amd64
          no-cache: ${{ inputs.force_rebuild == true }}
          build-args: |
            FRAPPE_IMAGE_TAG=version-16
            FRAPPE_BRANCH=${{ steps.upstream.outputs.ver_v }}
            FRAPPE_PATH=https://github.com/frappe/frappe
            APPS_JSON_BASE64=${{ steps.apps.outputs.apps_json_base64 }}

      - name: Build & Push (GHCR)
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: ./erpnext16/single-aio
          file: ./erpnext16/single-aio/Containerfile
          push: true
          platforms: linux/amd64
          pull: true
          no-cache: ${{ inputs.force_rebuild == true }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/erpnext16:single-aio
            ghcr.io/${{ github.repository_owner }}/erpnext16:${{ steps.upstream.outputs.ver_v }}-single-aio
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            io.erpnext.version=${{ steps.upstream.outputs.ver_v }}

      - name: Smoke test (basic)
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          IMG="ghcr.io/${{ github.repository_owner }}/erpnext16:${{ steps.upstream.outputs.ver_v }}-single-aio"
          docker pull "$IMG"
          docker run --rm --entrypoint bash "$IMG" -lc 'bench --version && mariadbd --version && redis-server --version && nginx -v'
