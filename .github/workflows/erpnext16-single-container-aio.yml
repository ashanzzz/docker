name: Build ERPNext16 single-container AIO image (scheduled)

on:
  schedule:
    - cron: "41 2 * * *" # daily (UTC)

permissions:
  contents: read
  packages: write

concurrency:
  group: erpnext16-single-aio-scheduled
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Discover upstream ERPNext v16.x.y
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          MAJOR=16
          PATTERN="^v?${MAJOR}\\.[0-9]+\\.[0-9]+$"
          url='https://hub.docker.com/v2/repositories/frappe/erpnext/tags?page_size=100'
          tmp=$(mktemp)
          : > "$tmp"
          for _ in $(seq 1 20); do
            json=$(curl -fsSL "$url")
            echo "$json" | jq -r '.results[].name' | grep -E "$PATTERN" >> "$tmp" || true
            url=$(echo "$json" | jq -r '.next // empty')
            [[ -z "$url" || "$url" == "null" ]] && break
          done
          VER_V=$(sort -V "$tmp" | tail -n1 || true)
          rm -f "$tmp"
          [[ -n "$VER_V" ]] || { echo "::error::discover version failed"; exit 1; }
          [[ "$VER_V" == v* ]] || VER_V="v$VER_V"
          echo "ver_v=$VER_V" >> "$GITHUB_OUTPUT"

      - name: Build APPS_JSON_BASE64 (pin erpnext app to upstream tag)
        id: apps
        shell: bash
        run: |
          set -euo pipefail
          VER_V="${{ steps.upstream.outputs.ver_v }}"
          APPS_JSON_BASE64=$(jq --arg ver "$VER_V" 'map(if (.url|endswith("/erpnext")) then .branch=$ver else . end)' erpnext16/image/apps.json \
            | (base64 -w 0 2>/dev/null || base64 | tr -d '\n'))
          echo "apps_json_base64=$APPS_JSON_BASE64" >> "$GITHUB_OUTPUT"

      - name: Build & Push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: ./erpnext16/single-aio
          file: ./erpnext16/single-aio/Containerfile
          push: true
          platforms: linux/amd64
          pull: true
          build-args: |
            FRAPPE_IMAGE_TAG=version-16
            FRAPPE_BRANCH=version-16
            FRAPPE_PATH=https://github.com/frappe/frappe
            APPS_JSON_BASE64=${{ steps.apps.outputs.apps_json_base64 }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/erpnext16:single-aio
            ghcr.io/${{ github.repository_owner }}/erpnext16:${{ steps.upstream.outputs.ver_v }}-single-aio
