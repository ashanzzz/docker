name: OpenClaw Sync & Build

on:
  schedule:
    # Run multiple times per day to reduce lag behind upstream releases.
    - cron: '0 */6 * * *' # every 6 hours (UTC)
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if official version tag already exists'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: openclaw-sync-and-build
  cancel-in-progress: false

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Sync upstream docker-setup.sh
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM_URL="https://raw.githubusercontent.com/openclaw/openclaw/main/docker-setup.sh"
          TARGET="openclaw/upstream/docker-setup.sh"

          mkdir -p "$(dirname "$TARGET")"
          curl -fsSL "$UPSTREAM_URL" -o "$TARGET.new"

          if [ -f "$TARGET" ] && cmp -s "$TARGET" "$TARGET.new"; then
            rm -f "$TARGET.new"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream docker-setup.sh changes."
          else
            mv "$TARGET.new" "$TARGET"
            chmod +x "$TARGET"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream docker-setup.sh changed; file updated."
          fi

      - name: Commit synced script
        if: ${{ steps.sync.outputs.changed == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add openclaw/upstream/docker-setup.sh
          git commit -m "chore(openclaw): sync upstream docker-setup.sh"
          git push

      - name: Resolve official OpenClaw version
        id: ver
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Use an authenticated GitHub API call to avoid rate limits.
          OFFICIAL_TAG=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/openclaw/openclaw/releases/latest \
            | jq -r '.tag_name // empty')

          if [ -z "$OFFICIAL_TAG" ] || [ "$OFFICIAL_TAG" = "null" ]; then
            OFFICIAL_TAG=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/openclaw/openclaw/tags?per_page=1 \
              | jq -r '.[0].name')
          fi

          OFFICIAL_TAG=${OFFICIAL_TAG#v}
          if [ -z "$OFFICIAL_TAG" ] || [ "$OFFICIAL_TAG" = "null" ]; then
            echo "Failed to resolve official OpenClaw version" >&2
            exit 1
          fi

          echo "official_version=$OFFICIAL_TAG" >> "$GITHUB_OUTPUT"
          echo "Official version: $OFFICIAL_TAG"
          echo "official_version=$OFFICIAL_TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Decide whether build is needed
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          FORCE_BUILD="${{ inputs.force_build == true }}"
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PATH="${OWNER_LC}/openclaw"
          VERSION="${{ steps.ver.outputs.official_version }}"

          echo "image_path=$IMAGE_PATH" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FORCE_BUILD" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=force_build" >> "$GITHUB_OUTPUT"
            echo "Build decision: FORCE_BUILD=true" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Proper GHCR auth: exchange scope for a registry bearer token.
          # NOTE: token endpoint may return 403 if the package doesn't exist yet; treat that as "needs build".
          GHCR_PULL_TOKEN=$(curl -sS "https://ghcr.io/token?service=ghcr.io&scope=repository:${IMAGE_PATH}:pull" | jq -r '.token // empty' || true)

          if [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=package_missing" >> "$GITHUB_OUTPUT"
            echo "Build required: ghcr.io/${IMAGE_PATH} not found yet (first build)." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TAGS_JSON=$(curl -sS -H "Authorization: Bearer ${GHCR_PULL_TOKEN}" "https://ghcr.io/v2/${IMAGE_PATH}/tags/list" || true)

          if [ -n "$TAGS_JSON" ] && echo "$TAGS_JSON" | jq -e --arg v "$VERSION" '.tags // [] | index($v) != null' >/dev/null; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "reason=official_version_exists" >> "$GITHUB_OUTPUT"
            echo "Skip build: ghcr.io/${IMAGE_PATH}:${VERSION} already exists." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=official_version_missing" >> "$GITHUB_OUTPUT"
            echo "Build required: official version tag ${VERSION} is not present." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up QEMU
        if: ${{ steps.decide.outputs.should_build == 'true' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: ${{ steps.decide.outputs.should_build == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.decide.outputs.should_build == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push OpenClaw image
        if: ${{ steps.decide.outputs.should_build == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ./openclaw
          file: ./openclaw/Dockerfile
          platforms: linux/amd64
          pull: true
          push: true
          build-args: |
            OPENCLAW_VERSION=${{ steps.ver.outputs.official_version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw:latest
            ghcr.io/${{ github.repository_owner }}/openclaw:${{ steps.ver.outputs.official_version }}
            ghcr.io/${{ github.repository_owner }}/openclaw:${{ steps.ver.outputs.official_version }}-r${{ github.run_number }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=openclaw
            org.opencontainers.image.version=${{ steps.ver.outputs.official_version }}

      - name: Smoke-check image metadata
        if: ${{ steps.decide.outputs.should_build == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/openclaw:${{ steps.ver.outputs.official_version }}

      - name: Nothing to build
        if: ${{ steps.decide.outputs.should_build != 'true' }}
        run: |
          echo "No build needed. Reason: ${{ steps.decide.outputs.reason }}"
