name: nextcloud-full sync & build

on:
  pull_request: {}
  schedule:
    - cron: "17 2 * * *" # daily (UTC)
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild even if version unchanged
        required: false
        default: "false"

permissions:
  contents: write
  packages: write

concurrency:
  group: nextcloud-full-ci-sync-build
  cancel-in-progress: false

jobs:
  pr_build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: v
        run: echo "ver=$(cat nextcloud-full/NEXTCLOUD_VERSION | tr -d '\r\n')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./nextcloud-full
          push: false
          platforms: linux/amd64
          build-args: |
            NEXTCLOUD_VERSION=${{ steps.v.outputs.ver }}

  sync_build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Resolve upstream latest Nextcloud 33 patch
        id: upstream
        run: |
          UPSTREAM="$(curl -fsSL https://raw.githubusercontent.com/nextcloud/docker/master/versions.json | jq -r '."33".version')"
          echo "version=$UPSTREAM" >> "$GITHUB_OUTPUT"
          echo "Upstream version: $UPSTREAM"

      - name: Verify upstream base image tag exists
        run: |
          docker run --rm quay.io/skopeo/stable:v1.15.0 inspect "docker://docker.io/library/nextcloud:${{ steps.upstream.outputs.version }}-apache" >/dev/null

      - name: Compare versions
        id: diff
        run: |
          CURRENT="$(cat nextcloud-full/NEXTCLOUD_VERSION | tr -d '\r\n')"
          UPSTREAM="${{ steps.upstream.outputs.version }}"
          FORCE="${{ inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$CURRENT" = "$UPSTREAM" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update NEXTCLOUD_VERSION (if changed)
        if: steps.diff.outputs.changed == 'true'
        run: echo "${{ steps.upstream.outputs.version }}" > nextcloud-full/NEXTCLOUD_VERSION

      - name: Commit & push version bump (if changed)
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nextcloud-full/NEXTCLOUD_VERSION

          if git diff --cached --quiet; then
            echo "No version change to commit (force build / already up-to-date)."
            exit 0
          fi

          git commit -m "chore(nextcloud-full): bump nextcloud to ${{ steps.upstream.outputs.version }}"
          git push

      - name: Read repo version
        id: v
        run: echo "ver=$(cat nextcloud-full/NEXTCLOUD_VERSION | tr -d '\r\n')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./nextcloud-full
          push: true
          platforms: linux/amd64
          build-args: |
            NEXTCLOUD_VERSION=${{ steps.v.outputs.ver }}
          tags: |
            ghcr.io/ashanzzz/nextcloud-full:${{ steps.v.outputs.ver }}-apache-full
            ghcr.io/ashanzzz/nextcloud-full:33-apache-full
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            io.nextcloud.version=${{ steps.v.outputs.ver }}

      - name: Create git tag (nextcloud-full-v33.x.y)
        if: steps.diff.outputs.changed == 'true'
        run: |
          TAG="nextcloud-full-v${{ steps.v.outputs.ver }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag exists: $TAG"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: GitHub Release
        if: steps.diff.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nextcloud-full-v${{ steps.v.outputs.ver }}
          name: nextcloud-full v${{ steps.v.outputs.ver }}
          body: |
            Derived from official nextcloud:${{ steps.v.outputs.ver }}-apache.
            Added apt packages (nextcloud-full/packages.txt):
            $(cat nextcloud-full/packages.txt)
