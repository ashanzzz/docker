name: build erpnext16 custom image (official apps)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GHCR tag (e.g. v16-custom, v16-hrms)"
        required: true
        default: "v16-custom"
      frappe_branch:
        description: "Frappe git ref for bench init (e.g. version-16 or v16.60.0)"
        required: true
        default: "version-16"
      apps_json_path:
        description: "Path to apps.json"
        required: true
        default: "erpnext16/image/apps.json"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build args (apps.json -> base64)
        id: apps
        shell: bash
        run: |
          set -euo pipefail
          APPS_JSON_PATH='${{ inputs.apps_json_path }}'
          if [[ ! -f "$APPS_JSON_PATH" ]]; then
            echo "apps.json not found: $APPS_JSON_PATH" >&2
            exit 2
          fi
          APPS_JSON_BASE64=$(base64 -w 0 "$APPS_JSON_PATH")
          echo "apps_json_base64=$APPS_JSON_BASE64" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./erpnext16/image
          file: ./erpnext16/image/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/erpnext16:${{ inputs.tag }}
          build-args: |
            FRAPPE_IMAGE_TAG=version-16
            FRAPPE_BRANCH=${{ inputs.frappe_branch }}
            FRAPPE_PATH=https://github.com/frappe/frappe
            APPS_JSON_BASE64=${{ steps.apps.outputs.apps_json_base64 }}
