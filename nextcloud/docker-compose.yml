services:
  db:
    image: mariadb:10.11
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MYSQL_PASSWORD=${DB_PASS}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
    volumes:
      - ${DB_DIR}:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ${REDIS_DIR}:/data

  nextcloud:
    image: ${NEXTCLOUD_IMAGE}
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - ${NEXTCLOUD_HTTP_PORT}:80
    environment:
      # initial install
      - NEXTCLOUD_ADMIN_USER=${NC_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NC_ADMIN_PASS}
      - NEXTCLOUD_TRUSTED_DOMAINS=${TRUSTED_DOMAINS}

      # DB
      - MYSQL_HOST=${DB_HOST}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}

      # reverse proxy
      - OVERWRITEPROTOCOL=${PUBLIC_PROTO}
      - OVERWRITECLIURL=${PUBLIC_URL}

      # php
      - PHP_UPLOAD_LIMIT=${PHP_UPLOAD_LIMIT}
      - PHP_MEMORY_LIMIT=1024M

      # redis (used by post-config via occ)
      - REDIS_HOST=${REDIS_HOST}

    volumes:
      # Keep Nextcloud upgrade-safe by NOT mapping /var/www/html entirely.
      - ${DATA_DIR}/config:/var/www/html/config
      - ${DATA_DIR}/custom_apps:/var/www/html/custom_apps
      - ${DATA_DIR}/themes:/var/www/html/themes
      - ${FILES_DIR}:/var/www/html/data

  cron:
    image: ${NEXTCLOUD_IMAGE}
    restart: unless-stopped
    depends_on:
      - nextcloud
    entrypoint: /cron.sh
    volumes:
      - ${DATA_DIR}/config:/var/www/html/config
      - ${DATA_DIR}/custom_apps:/var/www/html/custom_apps
      - ${DATA_DIR}/themes:/var/www/html/themes
      - ${FILES_DIR}:/var/www/html/data

  collabora:
    image: collabora/code:latest
    restart: unless-stopped
    profiles: ["collabora"]
    ports:
      - ${COLLABORA_PORT}:9980
    environment:
      - domain=${COLLABORA_DOMAIN_REGEX}
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
    restart: unless-stopped
    profiles: ["elasticsearch"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms${ES_HEAP} -Xmx${ES_HEAP}
    volumes:
      - ${DATA_DIR}/elasticsearch:/usr/share/elasticsearch/data
